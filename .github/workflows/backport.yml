name: Backport

on:
  pull_request:
    types: [closed, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  backport:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.base.ref, 'main') &&
      contains(join(github.event.pull_request.labels.*.name, ' '), 'backport ')
    runs-on: ubuntu-latest
    steps:
      - name: Backport to release branches
        uses: korthout/backport-action@v3
        with:
          github_token: ${{ secrets.BACKPORT_TOKEN || secrets.GITHUB_TOKEN }}
          pull_description: |
            Automated backport of #${pull_number} to `${target_branch}`.
          copy_requested_reviewers: true
